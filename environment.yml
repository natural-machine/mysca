channels:
  - conda-forge
  - bioconda
  - pytorch
dependencies:
  - python=3.12
  - numpy
  - scipy
  - scikit-learn
  - pandas
  - matplotlib
  - seaborn
  - biopython
  - jax
  - imageio
  - tqdm
  - ipykernel
  - ipywidgets
  - pytest
  - pytorch
  - torchvision
  - torchaudio
  # Optional external aligners (bioconda). Uncomment whichever you need
  # to exercise the out-of-sample paths in `sca-project` and
  # `sca-structure`, and the raw-FASTA path in `sca-prealign`.
  #   - mafft    # sca-prealign; sca-project --aligner mafft_add (default)
  #   - hmmer    # sca-project --aligner hmmalign (provides hmmbuild + hmmalign)
  #   - mmseqs2  # sca-prealign --cluster mmseqs2
  # In-sample projection and PDB loading require no external binary.
  #
  # Optional pip-only extra for sca-pymol --format mp4 / --format both:
  #   pip install -e '.[mp4]'     # installs imageio-ffmpeg (bundled ffmpeg)
  # Or equivalently: pip install imageio-ffmpeg
